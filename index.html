
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horoscope Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #0e0d17;
      color: #ddd6f0;
      line-height: 1.6;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    h1 {
      text-align: center;
      font-size: 1.9rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      color: #f0ecff;
      margin: 0 0 6px;
    }

    .subtitle {
      text-align: center;
      color: #9b90be;
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    /* ── search row ── */
    .search-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .search-row label {
      color: #b0a8d0;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
    }

    /* ── shared input / select styles ── */
    .search-row input,
    .input-row input,
    .input-row select {
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid #3a3560;
      background: #19172a;
      color: #e8e2f8;
      font-size: 0.95rem;
      font-family: Georgia, serif;
      outline: none;
      transition: border-color 0.2s;
      min-width: 110px;
    }

    .search-row input:focus,
    .input-row input:focus,
    .input-row select:focus {
      border-color: #6b5fa8;
    }

    .input-row select option {
      background: #19172a;
    }

    /* ── sign grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 32px;
    }

    .card {
      background: #19172a;
      border: 1px solid #2e2a45;
      border-radius: 10px;
      padding: 12px 10px;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
      border-color: #6b5fa8;
      background: #201d35;
    }

    .card button {
      width: 100%;
      padding: 8px 4px;
      background: transparent;
      border: none;
      color: #e8e2f8;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: Georgia, serif;
      letter-spacing: 0.03em;
    }

    .card button:hover { color: #ffffff; }

    .heart {
      font-size: 1.1rem;
      cursor: pointer;
      color: #3d3660;
      margin-top: 4px;
      display: inline-block;
      transition: color 0.2s;
      user-select: none;
      background: transparent;
      border: none;
      padding: 4px 8px;
    }

    .heart:hover { color: #7a6f9a; }
    .heart.favorited { color: #c084a0; }
    .heart.favorited:hover { color: #d9a0bc; }

    /* ── content boxes ── */
    .box {
      background: #19172a;
      border: 1px solid #3a3560;
      color: #e8e2f8;
      border-radius: 10px;
      padding: 22px 24px;
      margin-bottom: 28px;
      min-height: 110px;
      white-space: pre-line;
      line-height: 1.75;
      font-size: 0.95rem;
    }

    /* ── section headings ── */
    h2 {
      text-align: center;
      font-size: 1rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #b0a8d0;
      margin: 0 0 18px;
    }

    .section {
      margin-bottom: 40px;
    }

    /* ── input rows ── */
    .input-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .input-row label {
      color: #b0a8d0;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
    }

    /* ── unified button style ── */
    .btn {
      background: transparent;
      color: #c4bae8;
      border: 1px solid #4a4575;
      border-radius: 8px;
      padding: 9px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: Georgia, serif;
      letter-spacing: 0.06em;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .btn:hover {
      border-color: #6b5fa8;
      color: #ede8ff;
      background: #201d35;
    }

    /* keep pink-btn working for render.js retry button */
    .pink-btn {
      background: transparent;
      color: #c4bae8;
      border: 1px solid #4a4575;
      border-radius: 8px;
      padding: 9px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: Georgia, serif;
      letter-spacing: 0.06em;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .pink-btn:hover {
      border-color: #6b5fa8;
      color: #ede8ff;
      background: #201d35;
    }

    /* ── divider ── */
    .divider {
      border: none;
      border-top: 1px solid #2e2a45;
      margin: 0 0 40px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.5rem; }
      .container { padding: 28px 16px; }
      .box { font-size: 0.9rem; padding: 16px; }
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 3px solid #ff7ac6;
      outline-offset: 2px;
}
  </style>
</head>
<body>
  <div class="container">
    <h1>Horoscope Dashboard</h1>
    <div class="subtitle">Daily Horoscope &nbsp;·&nbsp; Big Three &nbsp;·&nbsp; Compatibility &nbsp;·&nbsp; Favorites</div>

    <div class="search-row">
      <label for="searchInput">Search</label>
      <input id="searchInput" type="text" placeholder="Type a sign name…" />
      <button id="favoritesBtn" class="btn">Show Favorites</button>
    </div>

    <div id="zodiacGrid" class="grid"></div>

    <div id="horoscopeBox" class="box">Select a zodiac sign to see today's horoscope.</div>

    <hr class="divider" />

    <div class="section">
      <h2>Big Three Generator</h2>
      <div class="input-row">
        <label for="monthInput">Month</label>
        <input id="monthInput" type="number" placeholder="1 – 12" min="1" max="12" />

        <label for="dayInput">Day</label>
        <input id="dayInput" type="number" placeholder="1 – 31" min="1" max="31" />

        <label for="hourInput">Hour</label>
        <input id="hourInput" type="number" placeholder="0 – 23" min="0" max="23" />

        <button id="bigThreeBtn" class="btn">Generate</button>
      </div>
      <div id="bigThreeBox" class="box">Enter your birth month, day, and hour to generate your Big Three.</div>
    </div>

    <hr class="divider" />

    <div class="section">
      <h2>Compatibility Checker</h2>
      <div class="input-row">
        <label for="sign1Select">First Sign</label>
        <select id="sign1Select"></select>

        <label for="sign2Select">Second Sign</label>
        <select id="sign2Select"></select>

        <button id="compatBtn" class="btn">Compare</button>
      </div>
      <div id="compatBox" class="box">Choose two signs to compare.</div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
